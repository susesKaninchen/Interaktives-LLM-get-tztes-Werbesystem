llm:
  default_model: "qwen3.6-27b"
  models:
    qwen3.6-27b:
      base_url: "https://models.mylab.th-luebeck.dev/v1/"
      api_key: "TH-Luebeck"
      model_name: "qwen3.6-27b"
      temperature: 0.7
      max_tokens: 8192
      description: "Standard Modell für normale Aufgaben (Qwen3.6-27B parameters)"
    qwen3.5-397b-a17b:
      base_url: "https://models.mylab.th-luebeck.dev/v1/"
      api_key: "TH-Luebeck"
      model_name: "qwen3.5-397b-a17b"
      temperature: 0.7
      max_tokens: 16384
      description: "Leistungsstärkstes Modell für schwere Aufgaben (Qwen3.5-397B parameters)"
  routing:
    router: "qwen3.6-27b"
    agents: "qwen3.5-397b-a17b"
    embedding: "local"

database:
  sqlite_url: "sqlite+aiosqlite:///./data/app.db"
  chroma_persist_dir: "./data/chroma"

search:
  provider: "duckduckgo"

crawler:
  max_pages: 10
  timeout_seconds: 30
